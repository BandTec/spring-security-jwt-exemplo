server.error.include-message=never
server.error.include-binding-errors=never

spring.datasource.url=jdbc:h2:mem:teste-security
spring.datasource.username=admin
spring.datasource.password=admin

spring.jpa.defer-datasource-initialization=true

management.endpoints.web.exposure.include=health

cors.allowedOrigins=http://localhost:3000,http://localhost:4200,http://localhost:5173

# validade do token (em segundos)
jwt.validity=3600

# segredo do token via variavel de ambiente (minimo 32 caracteres)
jwt.secret=${JWT_SECRET:dev-insecure-secret-change-me-in-production-min32chars}
jwt.issuer=exemplo-jwt-api
jwt.audience=exemplo-jwt-client
